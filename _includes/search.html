<div id="search_modal" role="dialog" aria-modal="true" aria-label="Rechercher un fromage">
      <div id="search-container">
            <div class="search-modal-header">
                  <button class="search-close-btn" onclick='search_modal()' aria-label="Fermer la recherche">Fermer</button>
            </div>
            <label for="search-input" class="sr-only">Rechercher un fromage</label>
            <input type="text" id="search-input" placeholder="Rechercher un fromage" aria-describedby="search-hint">
            <p id="search-hint" class="sr-only">Les résultats apparaissent après la saisie du premier caractère.</p>
            <ul id="results-container" aria-live="polite" aria-label="Résultats de recherche"></ul>
      </div>
      <!-- Script pointing to search-script.js -->
      <script src="/assets/search.js" type="text/javascript"></script>
      <!-- Configuration -->
      <script>
            SimpleJekyllSearch({
            searchInput: document.getElementById('search-input'),
            resultsContainer: document.getElementById('results-container'),
            json: '/search.json'
            })
      </script>
</div>
